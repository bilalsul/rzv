name: CDelivery

on:
  push:
    branches: [ main ]

jobs:
  draft_release:
    name: Draft a release
    runs-on: ubuntu-latest
    steps:
    - name: Clone the repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
    - name: Draft the release
      run: |
        HTTP_RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
          -X POST \
          -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          -H "Content-Type: application/json" \
          -d '{"tag_name": "v0.0.0", "target_commitish": "main", "name": "Draft Release", "body": "Draft release automatically generated by CI.", "draft": true, "prerelease": true}' \
          "${{ github.server_url }}/api/v1/repos/${{ github.repository }}/releases")
        if [ "$HTTP_RESPONSE" = "409" ]; then
          curl -s -X PATCH \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"body": "Draft release updated by CI."}' \
            "${{ github.server_url }}/api/v1/repos/${{ github.repository }}/releases/tags/v0.0.0"
        elif [ "$HTTP_RESPONSE" != "201" ]; then
          echo "::error::Failed to create draft release (HTTP $HTTP_RESPONSE)"
          exit 1
        fi