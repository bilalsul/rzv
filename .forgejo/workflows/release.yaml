  build:
    name: Build the ${{ matrix.file }} file
    # needs: testing
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            file: apk
            asset-content-type: application/java-archive
          # - os: ubuntu-latest
          #   file: aab
          #   asset-content-type: application/zip
          # - os: macos-latest
          #   file: ipa
          #   asset-content-type: application/octet-stream
      fail-fast: false
    env:
      FLUTTER_DEBUG_INFO_PATH: build/app/outputs/symbols
    steps:
    - name: Check matrix
      if: ${{ !(matrix.file == 'apk' && github.event.release.prerelease) || ((matrix.file == 'aab' || matrix.file == 'ipa') && !github.event.release.prerelease) }}
      run: exit
    - name: Clone the repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        path: code
    - name: Remove unrelated folders
      run: |
        rm -rf code/screens code/.github code/.forgejo
    - name: Get Flutter version
      id: get-flutter-version
      uses: zgosalvez/github-actions-get-flutter-version-env@34a86de9beede9d0771465c702d530c2aea2b1ee
      with:
        pubspec-file-path: code/pubspec.yaml
    - name: Cache Flutter
      id: flutter-cache
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306
      with:
        path: flutter
        key: ${{ env.cache-name }}-${{ matrix.os }}-${{ steps.get-flutter-version.outputs.version }}-${{ hashFiles('code/pubspec.lock') }}
        restore-keys: |
          ${{ env.cache-name }}-${{ matrix.os }}-${{ steps.get-flutter-version.outputs.version }}-
          ${{ env.cache-name }}-${{ matrix.os }}-
          ${{ env.cache-name }}-
      env:
        cache-name: flutter-cache
    - name: Clone the Flutter repository
      if: steps.flutter-cache.outputs.cache-hit != 'true'
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        repository: flutter/flutter
        ref: ${{ steps.get-flutter-version.outputs.version }}
        path: flutter
    - name: Add the flutter tool to the path
      run: |
        echo "$GITHUB_WORKSPACE/flutter/bin" >> $GITHUB_PATH
        echo "$GITHUB_WORKSPACE/flutter/bin/cache/dart-sdk/bin" >> $GITHUB_PATH
    - name: Populate the Flutter tool's cache of binary artifacts
      if: steps.flutter-cache.outputs.cache-hit != 'true'
      run: |
        flutter config --no-analytics
        flutter precache
    - name: Get Flutter packages
      run: flutter pub get
      working-directory: code

    # all
    - name: Get the release ID
      id: get-release-id
      run: |
        RELEASE_JSON=$(curl -s \
          -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          "${{ github.server_url }}/api/v1/repos/${{ github.repository }}/releases/tags/${{ github.event.release.tag_name }}")
        echo "::set-output name=release_id::$(echo "$RELEASE_JSON" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")"

    - name: Parse the release tag
      id: parse-release-tag
      run: | # remove the leading "v"
        VERSION=${{ github.event.release.tag_name }}
        echo "::set-output name=version::${VERSION#v}"
      working-directory: code
    - name: Set the app version
      uses: microsoft/variable-substitution@6287962da9e5b6e68778dc51e840caa03ca84495
      with:
        files: 'code/pubspec.yaml'
      env:
        version: ${{ steps.parse-release-tag.outputs.version }}

    # apk
    - name: Build an Android APK file
      if: matrix.file == 'apk'
      run: |
        flutter build apk --obfuscate --split-debug-info=$FLUTTER_DEBUG_INFO_PATH --split-per-abi
        mv build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk ../../RZV-armeabi-v7a-v${{steps.parse-release-tag.outputs.version}}.apk
        mv build/app/outputs/flutter-apk/app-arm64-v8a-release.apk ../../RZV-arm64-v8a-v${{steps.parse-release-tag.outputs.version}}.apk
        mv build/app/outputs/flutter-apk/app-x86_64-release.apk ../../RZV-x86_64-v${{steps.parse-release-tag.outputs.version}}.apk
        mv build/app/outputs/mapping/release/mapping.txt ../../apk-mapping.txt
      working-directory: code
    
    # # aab
    # - name: Build an Android App Bundle file
    #   if: matrix.file == 'aab'
    #   run: |
    #     flutter build appbundle --obfuscate --split-debug-info=$FLUTTER_DEBUG_INFO_PATH
    #     mv build/app/outputs/bundle/release/app-release.aab ../app.aab
    #     mv build/app/outputs/mapping/release/mapping.txt ../aab-mapping.txt
    #   working-directory: code

    # apk/aab
    # - name: Upload the artifacts — ${{ matrix.file }}-mapping.txt file
    #   if: matrix.file == 'apk' || matrix.file == 'aab'
    #   uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
    #   with:
    #     name: ${{ matrix.file }}-mapping.txt
    #     path: ${{ matrix.file }}-mapping.txt
    # - name: Upload the release assets — ${{ matrix.file }}-mapping.txt file
    #   if: matrix.file == 'apk' || matrix.file == 'aab'
    #   uses: actions/upload-release-asset@e8f9f06c4b078e705bd2ea027f0926603fc9b4d5
    #   with:
    #     upload_url: ${{ github.event.release.upload_url }}
    #     asset_path: ${{ matrix.file }}-mapping.txt
    #     asset_name: ${{ matrix.file }}-mapping.txt
    #     asset_content_type: text/plain
    #   env:
    #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # ipa
    # - name: Build an iOS App Store Package file
    #   if: matrix.file == 'ipa'
    #   run: |
    #     flutter build ios --no-codesign --obfuscate --split-debug-info=$FLUTTER_DEBUG_INFO_PATH
    #     echo "::warning::TODO: fastlane export_ipa"
    #     echo "TODO: mv code/build/app/outputs/ipa/app.ipa ../app.ipa"
    #   working-directory: code

    # all
    - name: Archive Flutter ${{ matrix.file }} symbols
      run: zip --recurse-paths ${{ github.workspace }}/code/${{ matrix.file }}-symbols.zip .
      working-directory: code/${{ env.FLUTTER_DEBUG_INFO_PATH }}
    - name: Upload the artifacts — ${{ matrix.file }}-symbols.zip file
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
      with:
        name: ${{ matrix.file }}-symbols.zip
        path: code/${{ matrix.file }}-symbols.zip
    - name: Upload the release assets — ${{ matrix.file }}-symbols.zip file
      run: |
        curl -s -X POST \
          -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          -F "attachment=@code/${{ matrix.file }}-symbols.zip" \
          "${{ github.server_url }}/api/v1/repos/${{ github.repository }}/releases/${{ steps.get-release-id.outputs.release_id }}/assets"
    # - name: Upload the artifacts — ${{ matrix.file }} file
    #   uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
    #   with:
    #     name: RZV-${{steps.parse-release-tag.outputs.version}}.${{ matrix.file }}
    #     path: RZV-${{steps.parse-release-tag.outputs.version}}.${{ matrix.file }}
    #     if-no-files-found: error
    # - name: Upload the release assets — ${{ matrix.file }} file
    #   uses: actions/upload-release-asset@e8f9f06c4b078e705bd2ea027f0926603fc9b4d5
    #   with:
    #     upload_url: ${{ github.event.release.upload_url }}
    #     asset_path: RZV-${{steps.parse-release-tag.outputs.version}}.${{ matrix.file }}
    #     asset_name: RZV-${{steps.parse-release-tag.outputs.version}}.${{ matrix.file }}
    #     asset_content_type: ${{ matrix.asset-content-type }}
    #   env:
    #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Upload the artifacts — armeabi-v7a Apk file
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
      with:
        name: RZV-armeabi-v7a-v${{steps.parse-release-tag.outputs.version}}.apk
        path: RZV-armeabi-v7a-v${{steps.parse-release-tag.outputs.version}}.apk
        if-no-files-found: error
    - name: Upload the release asset — armeabi-v7a Apk file
      run: |
        curl -s -X POST \
          -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          -F "attachment=@RZV-armeabi-v7a-v${{steps.parse-release-tag.outputs.version}}.apk" \
          "${{ github.server_url }}/api/v1/repos/${{ github.repository }}/releases/${{ steps.get-release-id.outputs.release_id }}/assets"

    - name: Upload the artifacts — arm64-v8a Apk file
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
      with:
        name: RZV-arm64-v8a-v${{steps.parse-release-tag.outputs.version}}.apk
        path: RZV-arm64-v8a-v${{steps.parse-release-tag.outputs.version}}.apk
        if-no-files-found: error
    - name: Upload the release asset — arm64-v8a Apk file
      run: |
        curl -s -X POST \
          -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          -F "attachment=@RZV-arm64-v8a-v${{steps.parse-release-tag.outputs.version}}.apk" \
          "${{ github.server_url }}/api/v1/repos/${{ github.repository }}/releases/${{ steps.get-release-id.outputs.release_id }}/assets"

    - name: Upload the artifacts — x86_64 Apk file
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
      with:
        name: RZV-x86_64-v${{steps.parse-release-tag.outputs.version}}.apk
        path: RZV-x86_64-v${{steps.parse-release-tag.outputs.version}}.apk
        if-no-files-found: error
    - name: Upload the release asset — x86_64 Apk file
      run: |
        curl -s -X POST \
          -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          -F "attachment=@RZV-x86_64-v${{steps.parse-release-tag.outputs.version}}.apk" \
          "${{ github.server_url }}/api/v1/repos/${{ github.repository }}/releases/${{ steps.get-release-id.outputs.release_id }}/assets"